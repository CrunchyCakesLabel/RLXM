<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RLXM — Music Producer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированный градиент фона (переливание) */
        body {
            background: linear-gradient(135deg, #ffe5d9, #e0c9b6, #b5a898, #8f8f8f);
            background-size: 400% 400%;
            animation: gradientFlow 18s ease infinite;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Лучи на фоне (поверх градиента, под карточкой) */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-conic-gradient(from 0deg, rgba(255,245,235,0.2) 0deg, rgba(255,245,235,0) 15deg, rgba(255,235,220,0.15) 30deg);
            pointer-events: none;
            z-index: 1;
        }
        
        /* Canvas для частиц (дождь) */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* Основная карточка */
        .card {
            max-width: 560px;
            width: 100%;
            background: rgba(20, 20, 22, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.08);
            transition: all 0.4s ease;
            z-index: 3;
            text-align: center;
            position: relative;
        }
        
        .card:hover {
            background: rgba(20, 20, 22, 0.75);
            box-shadow: 0 30px 55px -15px rgba(0, 0, 0, 0.6);
        }

        /* Аватар */
        .avatar-wrapper {
            width: 140px;
            height: 140px;
            margin: 0 auto 1.2rem;
            position: relative;
        }
        
        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 28px;
            display: block;
            box-shadow: 0 0 0 3px rgba(255, 220, 190, 0.5), 0 20px 35px -10px black;
            transition: all 0.25s ease;
            position: relative;
            z-index: 2;
        }
        
        .avatar-wrapper::before {
            content: '';
            position: absolute;
            inset: -10px;
            background: radial-gradient(circle, rgba(255,200,160,0.5) 0%, rgba(255,180,140,0) 80%);
            filter: blur(16px);
            border-radius: 40px;
            z-index: 1;
            opacity: 0.8;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .avatar:hover {
            transform: scale(1.02);
            box-shadow: 0 0 0 4px rgba(255, 220, 180, 0.7);
        }

        /* Имя */
        h1 {
            font-size: 3.1rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff1e6, #e7e7e7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
            display: inline-block;
            padding: 0 0.2rem;
        }
        
        h1:hover {
            background: linear-gradient(135deg, #ffc8a2, #ffb07c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(255, 160, 100, 0.4);
            transform: scale(1.02);
        }

        /* About me под ником */
        .about {
            font-size: 1rem;
            font-weight: 450;
            color: #dedede;
            background: rgba(0, 0, 0, 0.3);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            margin-bottom: 2rem;
            transition: all 0.25s;
            cursor: default;
        }
        
        .about:hover {
            background: rgba(255, 160, 100, 0.3);
            color: #fff0e0;
            box-shadow: 0 0 8px rgba(255, 160, 100, 0.6);
            transform: scale(1.02);
        }

        /* Секция ссылок */
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 2rem 0 2rem;
        }
        
        .social-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .social-links a {
            background: rgba(35, 35, 42, 0.7);
            backdrop-filter: blur(4px);
            padding: 0.6rem 1.3rem;
            border-radius: 60px;
            color: #f0f0f0;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,240,0.15);
        }
        
        .social-links a:hover {
            background: #ffaa77;
            color: #1a1a1a;
            transform: translateY(-3px);
            box-shadow: 0 0 12px rgba(255, 140, 70, 0.8);
            border-color: #ffddbb;
        }
        
        /* Контакты */
        .contact-info {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.2rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(255,255,220,0.2);
            font-size: 0.9rem;
            color: #ccc;
        }
        
        .contact-info span {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.35);
            padding: 0.3rem 1rem;
            border-radius: 48px;
            transition: all 0.2s;
            cursor: default;
        }
        
        .contact-info span:hover {
            background: rgba(255, 140, 70, 0.6);
            color: white;
            box-shadow: 0 0 12px rgba(255, 120, 50, 0.5);
            transform: scale(1.02);
        }
        
        .contact-info a {
            color: inherit;
            text-decoration: none;
        }

        hr {
            margin: 1.5rem 0 0.8rem;
            border-color: rgba(255,220,180,0.3);
            width: 80px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Адаптив */
        @media (max-width: 520px) {
            .card {
                padding: 1.5rem;
            }
            h1 {
                font-size: 2.4rem;
            }
            .avatar-wrapper {
                width: 110px;
                height: 110px;
            }
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="card">
        <div class="avatar-wrapper">
            <img class="avatar" src="IMG_2973.PNG" alt="RLXM avatar" id="avatarImage" onerror="this.onerror=null; this.src='https://placehold.co/400x400/ffe5d9/8f8f8f?text=RLXM'">
        </div>
        
        <h1>RLXM</h1>
        <div class="about">music producer since 2021</div>
        
        <div class="links">
            <div class="social-links">
                <a href="https://www.youtube.com/@RLXMbeats" target="_blank">▶️ YouTube</a>
                <a href="https://open.spotify.com/artist/67jR1Ghp8nlWrFVgLox3m8?si=aJSXBqFgRmK_wWturd-okQ" target="_blank">🎧 Spotify</a>
                <a href="http://instagram.com/rlxmofc/" target="_blank">📷 Instagram</a>
            </div>
        </div>
        
        <div class="contact-info">
            <span>✉️ <a href="mailto:rlxm033@gmail.com">rlxm033@gmail.com</a></span>
            <span>💬 Discord: rlxm_contact</span>
        </div>
        <hr />
        <div style="font-size: 0.7rem; margin-top: 1rem; color: rgba(255,240,220,0.7);">
            🧁 crunchy music, smooth waves
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            const avatarImg = document.getElementById('avatarImage');
            let particles = [];
            let particleImg = null;
            let animationId = null;
            let width, height;

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }

            function createParticles() {
                const count = 110;
                particles = [];
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        size: 6 + Math.random() * 14,
                        speedY: 0.8 + Math.random() * 1.5,
                        opacity: 0.3 + Math.random() * 0.5
                    });
                }
            }

            function drawParticles() {
                if (!ctx || !particleImg) return;
                ctx.clearRect(0, 0, width, height);
                
                for (let p of particles) {
                    ctx.save();
                    ctx.globalAlpha = p.opacity;
                    ctx.drawImage(particleImg, p.x - p.size/2, p.y - p.size/2, p.size, p.size);
                    ctx.restore();
                    
                    // обновление позиции (дождь)
                    p.y += p.speedY;
                    if (p.y > height + p.size) {
                        p.y = -p.size;
                        p.x = Math.random() * width;
                    }
                }
                animationId = requestAnimationFrame(drawParticles);
            }

            function initParticleRain() {
                if (avatarImg.complete && avatarImg.naturalWidth !== 0) {
                    particleImg = avatarImg;
                    resizeCanvas();
                    createParticles();
                    drawParticles();
                } else {
                    avatarImg.onload = () => {
                        particleImg = avatarImg;
                        resizeCanvas();
                        createParticles();
                        drawParticles();
                    };
                }
                window.addEventListener('resize', () => {
                    resizeCanvas();
                    createParticles();
                });
            }

            initParticleRain();
        })();
    </script>
</body>
</html>
