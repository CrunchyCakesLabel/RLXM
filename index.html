<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLXM — музыка, карусель релизов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0b0b12;
            color: #ededf0;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* шапка */
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .avatar {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 30px;
            box-shadow: 0 0 0 3px rgba(220, 180, 255, 0.4);
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #f5f0ff, #b9a5ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .sub {
            color: #a9a9c5;
            margin-top: 0.5rem;
        }

        /* карусель */
        .carousel {
            position: relative;
            margin: 2rem 0;
        }

        .carousel-track {
            display: flex;
            gap: 1.5rem;
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            padding: 1rem 0.2rem 2rem;
        }

        .carousel-track::-webkit-scrollbar {
            height: 6px;
        }

        .carousel-track::-webkit-scrollbar-thumb {
            background: #4a3b6e;
            border-radius: 10px;
        }

        .release-card {
            flex: 0 0 220px;
            background: #12121c;
            border-radius: 1.5rem;
            border: 1px solid #2a2a38;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .release-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 30px -12px rgba(0, 0, 0, 0.5);
            border-color: #7f6bb3;
        }

        .card-cover {
            height: 220px;
            background: #1e1e2a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            padding: 0.8rem;
        }

        .card-artist {
            font-size: 0.8rem;
            color: #b9b3d6;
        }

        .card-title {
            font-weight: 700;
            margin: 0.3rem 0;
            font-size: 0.95rem;
        }

        .card-date {
            font-size: 0.7rem;
            color: #7b7b9a;
        }

        .card-link {
            display: inline-block;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #d0bdf4;
            text-decoration: none;
        }

        .card-link:hover {
            text-decoration: underline;
        }

        .carousel-btn {
            position: absolute;
            top: 45%;
            background: #1f1f2c;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            transform: translateY(-50%);
            z-index: 2;
            opacity: 0.6;
            transition: 0.2s;
        }

        .carousel-btn:hover {
            opacity: 1;
            background: #35334a;
        }

        .btn-left {
            left: -10px;
        }

        .btn-right {
            right: -10px;
        }

        .footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #5e5e79;
        }

        @media (max-width: 700px) {
            .carousel-btn {
                display: none;
            }
            .release-card {
                flex: 0 0 180px;
            }
            .card-cover {
                height: 180px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="IMG_2973.PNG" alt="RLXM avatar" class="avatar" onerror="this.src='https://placehold.co/400x400/2a2a3a/ccc?text=RLXM'">
        <h1>RLXM</h1>
        <div class="sub">music producer · brazilian funk · phonk</div>
    </div>

    <div class="carousel">
        <button class="carousel-btn btn-left" id="scrollLeft">←</button>
        <div class="carousel-track" id="releaseTrack">
            <div style="width: 100%; text-align: center; padding: 2rem;">Загрузка релизов...</div>
        </div>
        <button class="carousel-btn btn-right" id="scrollRight">→</button>
    </div>

    <div class="footer">
        🧁 crunchy music, smooth waves · обновляется автоматически
    </div>
</div>

<script>
    // ⬇️ ЗАМЕНИ НА СВОЙ ID ТАБЛИЦЫ ⬇️
    const SHEET_ID = '1A2B3C4D5E6F7G8H9I0J';  // ← сюда вставь ID своей Google таблицы
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

    async function loadReleases() {
        try {
            const response = await fetch(CSV_URL);
            const csvText = await response.text();
            const rows = csvText.split('\n').slice(1); // пропускаем заголовок
            const releases = rows
                .filter(row => row.trim() !== '')
                .map(row => {
                    const [title, artist, cover_url, spotify_url, release_date] = row.split(',');
                    return { title, artist, cover_url, spotify_url, release_date };
                })
                .filter(r => r.title && r.title !== 'title');

            const trackDiv = document.getElementById('releaseTrack');
            if (releases.length === 0) {
                trackDiv.innerHTML = '<div style="width:100%; text-align:center;">Нет релизов — добавь строки в таблицу.</div>';
                return;
            }

            trackDiv.innerHTML = releases.map(r => `
                <div class="release-card">
                    <div class="card-cover">
                        <img src="${r.cover_url || 'https://placehold.co/400x400/1e1e2a/7b6b9b?text=🎵'}" alt="cover">
                    </div>
                    <div class="card-info">
                        <div class="card-artist">${escapeHtml(r.artist || 'RLXM')}</div>
                        <div class="card-title">${escapeHtml(r.title)}</div>
                        <div class="card-date">${r.release_date || ''}</div>
                        <a href="${r.spotify_url || '#'}" target="_blank" class="card-link">Listen →</a>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            console.error('Ошибка загрузки релизов:', error);
            document.getElementById('releaseTrack').innerHTML = '<div style="width:100%; text-align:center;">Не удалось загрузить релизы. Проверь ID таблицы и доступ.</div>';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // карусель
    const track = document.getElementById('releaseTrack');
    document.getElementById('scrollLeft').addEventListener('click', () => {
        track.scrollBy({ left: -260, behavior: 'smooth' });
    });
    document.getElementById('scrollRight').addEventListener('click', () => {
        track.scrollBy({ left: 260, behavior: 'smooth' });
    });

    loadReleases();
</script>
</body>
</html>
